- title: "Dropsonde Helicity Boundary Layer Composites"
  desc: "Data analysis scripts to process GPS dropsonde composite datasets, calculate boundary layer helicity, and determine the kinematic boundary layer heights of tropical cyclones of varying intensities."
  tags: ["Helicity", "Dropsonde", "Boundary Layer", "Python &amp; MATLAB"]

- title: "WxChallenge MOS Calibration Model"
  desc: "Statistical post-processing codes using 10-year historical observation data to calibrate and correct the forecast tails of GFS Model Output Statistics (MOS). Used for the national WxChallenge forecasting competition."
  tags: ["WxChallenge", "MOS Calibration", "Python", "GFS Post-processing"]

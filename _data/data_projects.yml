- title: "Pangu-Weather DART Model Interface"
  desc: "An ensemble data assimilation interface connecting the machine learning weather prediction model Pangu-Weather with NCAR's Data Assimilation Research Testbed (DART). This code is officially merged into the main NCAR DART codebase."
  tags: ["DART Core", "Pangu-Weather", "Ensemble DA", "Fortran &amp; Python"]

---
layout: default
---

<h1 class="page-title">{{ page.title }}</h1>
<p class="page-breadcrumb">
  Home / <a href="{{ base_path }}/blog/" style="color: var(--text-tertiary); text-decoration: underline;">Blog</a> / {{ page.date | date: "%B %d, %Y" }}
  {% if page.read_time %} · ⏱️ {{ page.read_time }} min read{% endif %}
</p>
<div class="divider"></div>

<article class="post-content" style="font-size: 16.5px; line-height: 1.8; color: var(--text-secondary);">
  {{ content }}
</article>

{% if page.tags %}
<div class="divider"></div>
<div class="interests-grid" style="margin-top: 16px;">
  <span style="font-family: var(--sans); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--text-tertiary); display: inline-flex; align-items: center; margin-right: 8px;">Tags:</span>
  {% for tag in page.tags %}
  <span class="badge">{{ tag }}</span>
  {% endfor %}
</div>
{% endif %}
